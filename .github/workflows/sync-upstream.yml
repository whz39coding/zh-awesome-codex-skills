name: Sync upstream

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ComposioHQ/awesome-codex-skills.git || true
          git fetch upstream master

      - name: Merge upstream into sync branch
        run: |
          git checkout -B sync-upstream origin/master
          git merge upstream/master --no-edit -X ours

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet origin/master..sync-upstream; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.changes.outputs.has_changes == 'true'
        run: git push --force-with-lease origin sync-upstream

      - name: Create or update pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view sync-upstream --base master --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --head sync-upstream \
            --base master \
            --title "chore: sync upstream awesome-codex-skills" \
            --body "自动同步上游仓库 ComposioHQ/awesome-codex-skills。

合并前请检查：
- 是否新增或删除 skills
- README 中文索引是否需要更新
- 上游是否新增 LICENSE、NOTICE 或版权相关说明"
